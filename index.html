<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شاشة العرض</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #05050f; --bg2: #080818; --bg3: #0d0d28;
      --primary: #ffd700; --primary-rgb: 255,215,0;
      --secondary: #4ecca3; --secondary-rgb: 78,204,163;
      --text: #fff; --muted: #8888bb; --dim: #333355;
      --bar-bg: rgba(0,0,0,0.4); --sidebar-bg: rgba(0,0,0,0.3);
      --card-bg: rgba(255,255,255,0.015); --card-border: rgba(255,255,255,0.04);
      --marquee-bg: rgba(255,215,0,0.05); --marquee-border: rgba(255,215,0,0.1);
    }
    * { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg1); height: 100vh; color: var(--text); overflow: hidden; user-select: none; display: flex; flex-direction: column; }

    .frame { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    .frame-border-outer { position: absolute; inset: 4px; border: 2px solid rgba(var(--primary-rgb),0.15); border-radius: 8px; animation: borderPulse 4s ease-in-out infinite; }
    .frame-border-inner { position: absolute; inset: 10px; border: 1px solid rgba(var(--secondary-rgb),0.08); border-radius: 6px; }
    @keyframes borderPulse { 0%,100%{border-color:rgba(var(--primary-rgb),0.15);box-shadow:inset 0 0 30px rgba(var(--primary-rgb),0.03),0 0 30px rgba(var(--primary-rgb),0.03)} 50%{border-color:rgba(var(--primary-rgb),0.35);box-shadow:inset 0 0 60px rgba(var(--primary-rgb),0.06),0 0 60px rgba(var(--primary-rgb),0.06)} }

    .corner-diamond { position: absolute; width: 16px; height: 16px; background: var(--primary); transform: rotate(45deg); animation: diamondPulse 3s ease-in-out infinite; }
    .corner-diamond::before { content: ''; position: absolute; inset: 3px; background: var(--bg1); }
    .cd-tl { top: -2px; left: -2px; } .cd-tr { top: -2px; right: -2px; } .cd-bl { bottom: -2px; left: -2px; } .cd-br { bottom: -2px; right: -2px; }
    .cd-tl, .cd-br { animation-delay: 0s; } .cd-tr, .cd-bl { animation-delay: 1.5s; }
    @keyframes diamondPulse { 0%,100%{background:var(--primary);box-shadow:0 0 8px rgba(var(--primary-rgb),0.3)} 50%{box-shadow:0 0 25px rgba(var(--primary-rgb),0.8),0 0 50px rgba(var(--primary-rgb),0.3)} }

    .run-light { position: absolute; width: 80px; height: 3px; border-radius: 2px; filter: blur(0.5px); }
    .run-top { top: 4px; background: linear-gradient(90deg,transparent,var(--primary),#fff,var(--primary),transparent); animation: runTop 8s linear infinite; }
    .run-right { right: 4px; top: 0; width: 3px; height: 80px; background: linear-gradient(180deg,transparent,var(--secondary),#fff,var(--secondary),transparent); animation: runRight 8s linear infinite; }
    .run-bottom { bottom: 4px; background: linear-gradient(90deg,transparent,var(--primary),#fff,var(--primary),transparent); animation: runBottom 8s linear infinite; }
    .run-left { left: 4px; top: 0; width: 3px; height: 80px; background: linear-gradient(180deg,transparent,var(--secondary),#fff,var(--secondary),transparent); animation: runLeft 8s linear infinite; }
    @keyframes runTop { 0%{left:-80px} 100%{left:calc(100% + 80px)} } @keyframes runRight { 0%{top:-80px} 100%{top:calc(100% + 80px)} } @keyframes runBottom { 0%{left:calc(100% + 80px)} 100%{left:-80px} } @keyframes runLeft { 0%{top:calc(100% + 80px)} 100%{top:-80px} }

    .arc { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px solid transparent; }
    .arc-tl { top: 6px; left: 6px; border-top-color: rgba(var(--primary-rgb),0.25); border-left-color: rgba(var(--primary-rgb),0.25); animation: arcSpin 6s linear infinite; }
    .arc-tr { top: 6px; right: 6px; border-top-color: rgba(var(--secondary-rgb),0.25); border-right-color: rgba(var(--secondary-rgb),0.25); animation: arcSpin 6s linear infinite reverse; }
    .arc-bl { bottom: 6px; left: 6px; border-bottom-color: rgba(var(--secondary-rgb),0.25); border-left-color: rgba(var(--secondary-rgb),0.25); animation: arcSpin 6s linear infinite; }
    .arc-br { bottom: 6px; right: 6px; border-bottom-color: rgba(var(--primary-rgb),0.25); border-right-color: rgba(var(--primary-rgb),0.25); animation: arcSpin 6s linear infinite reverse; }
    @keyframes arcSpin { to { transform: rotate(360deg); } }

    .star-particle { position: absolute; width: 2px; height: 2px; background: var(--primary); border-radius: 50%; opacity: 0; animation: starFloat linear infinite; }
    .star-particle:nth-child(1){left:8%;animation-duration:9s;animation-delay:0s} .star-particle:nth-child(2){left:18%;animation-duration:11s;animation-delay:2s}
    .star-particle:nth-child(3){left:30%;animation-duration:8s;animation-delay:4s} .star-particle:nth-child(4){left:42%;animation-duration:12s;animation-delay:1s}
    .star-particle:nth-child(5){left:55%;animation-duration:7s;animation-delay:5s} .star-particle:nth-child(6){left:65%;animation-duration:10s;animation-delay:3s}
    .star-particle:nth-child(7){left:78%;animation-duration:9s;animation-delay:6s} .star-particle:nth-child(8){left:90%;animation-duration:11s;animation-delay:0.5s}
    @keyframes starFloat { 0%{bottom:-5px;opacity:0;transform:scale(0.5)} 8%{opacity:0.8;transform:scale(1)} 50%{opacity:0.4} 92%{opacity:0.8;transform:scale(1)} 100%{bottom:100%;opacity:0;transform:scale(0.5)} }

    .glow-spot { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.08; animation: glowDrift 12s ease-in-out infinite alternate; }
    .gs-1 { width:300px;height:300px;background:var(--primary);top:-100px;right:-50px;animation-delay:0s }
    .gs-2 { width:250px;height:250px;background:var(--secondary);bottom:-80px;left:-40px;animation-delay:4s }
    .gs-3 { width:200px;height:200px;background:var(--primary);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:8s;opacity:0.04 }
    @keyframes glowDrift { 0%{opacity:0.05;transform:translate(0,0) scale(1)} 100%{opacity:0.12;transform:translate(20px,-15px) scale(1.2)} }

    .top-bar { display:flex;justify-content:space-between;align-items:center;padding:0.6rem 2.5rem;background:var(--bar-bg);border-bottom:1px solid rgba(var(--primary-rgb),0.1);flex-shrink:0;height:56px;position:relative;z-index:1; }
    .brand { display:flex;align-items:center;gap:1rem; }
    .brand .uni { font-size:1.2rem;font-weight:800;color:var(--primary);text-shadow:0 0 20px rgba(var(--primary-rgb),0.3);letter-spacing:0.5px; }
    .brand .sep { width:2px;height:26px;background:linear-gradient(180deg,transparent,var(--primary),transparent); }
    .brand .dept { font-size:1rem;color:var(--muted);font-weight:700; }
    .clock { font-size:1.1rem;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums; }

    .body { flex:1;display:flex;overflow:hidden;position:relative;z-index:1;background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 50%,var(--bg2) 100%); }
    .sidebar { width:380px;flex-shrink:0;background:var(--sidebar-bg);border-left:1px solid rgba(var(--primary-rgb),0.06);display:flex;flex-direction:column;padding:1rem 0.8rem;gap:0.5rem;overflow-y:auto; }
    .sb-head { text-align:center;padding:0.5rem 0 0.8rem;border-bottom:1px solid rgba(var(--primary-rgb),0.08);margin-bottom:0.3rem; }
    .sb-head h2 { font-size:1.05rem;font-weight:800;color:var(--primary);text-shadow:0 0 12px rgba(var(--primary-rgb),0.15); }

    .cc { background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:0.85rem 1rem;display:flex;align-items:center;gap:0.8rem;transition:all 0.5s ease;position:relative;overflow:hidden; }
    .cc::after { content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 16px 16px 0;transition:all 0.5s ease; }
    .cc.idle { border-color:rgba(var(--secondary-rgb),0.08); } .cc.idle::after { background:linear-gradient(180deg,var(--secondary),#2a9d7a); }
    .cc.busy { border-color:rgba(var(--primary-rgb),0.2);background:linear-gradient(135deg,rgba(var(--primary-rgb),0.06),rgba(var(--primary-rgb),0.015));animation:busyPulse 3s ease-in-out infinite; }
    .cc.busy::after { background:linear-gradient(180deg,var(--primary),#e6b800);box-shadow:0 0 10px rgba(var(--primary-rgb),0.3); }
    @keyframes busyPulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 20px rgba(var(--primary-rgb),0.06),inset 0 0 12px rgba(var(--primary-rgb),0.02)} }
    .cc-info { flex:1;min-width:0; }
    .cc-name { font-size:1rem;font-weight:800;margin-bottom:0.15rem;transition:color 0.5s; }
    .cc.idle .cc-name { color:var(--secondary); } .cc.busy .cc-name { color:var(--primary); }
    .cc-status { font-size:0.8rem;font-weight:600;transition:color 0.5s; }
    .cc.idle .cc-status { color:#2a7a5a; } .cc.busy .cc-status { color:rgba(var(--primary-rgb),0.6); }
    .cc-num { text-align:center;flex-shrink:0;min-width:90px; }
    .cc-big { font-size:2.5rem;font-weight:900;line-height:1;transition:all 0.5s ease; }
    .cc.idle .cc-big { color:var(--dim);font-size:1.5rem; }
    .cc.busy .cc-big { color:var(--primary);text-shadow:0 0 15px rgba(var(--primary-rgb),0.35);animation:numGlow 2s ease-in-out infinite; }
    .cc-label { font-size:0.65rem;font-weight:700;color:var(--dim);margin-top:0.1rem; }
    .cc.busy .cc-label { color:rgba(var(--primary-rgb),0.5); }
    @keyframes numGlow { 0%,100%{text-shadow:0 0 15px rgba(var(--primary-rgb),0.35)} 50%{text-shadow:0 0 25px rgba(var(--primary-rgb),0.65),0 0 45px rgba(var(--primary-rgb),0.2)} }
    .cc-dot { width:8px;height:8px;border-radius:50%;background:var(--secondary);position:absolute;top:10px;left:10px;animation:dotBlink 3s ease-in-out infinite; }
    @keyframes dotBlink { 0%,100%{opacity:0.25} 50%{opacity:1;box-shadow:0 0 8px rgba(var(--secondary-rgb),0.5)} }

    .center { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative; }
    .idle-msg { text-align:center;color:var(--dim);position:relative;z-index:1; }
    .idle-msg .ic { font-size:5rem;margin-bottom:1rem;opacity:0.12;animation:idleFloat 4s ease-in-out infinite; }
    .idle-msg .tx { font-size:2rem;font-weight:700; }
    @keyframes idleFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-15px) scale(1.05)} }

    .active-call { display:none;text-align:center;width:100%;animation:fadeIn 0.4s ease;position:relative;z-index:1; }
    .active-call.show { display:block; }
    .ac-student-section { margin-bottom:0.5rem; }
    .ac-label { font-size:1.8rem;color:var(--primary);font-weight:900;margin-bottom:0.5rem;letter-spacing:3px;opacity:0.9;text-shadow:0 0 15px rgba(var(--primary-rgb),0.2); }
    .ac-number { font-size:clamp(8rem,22vw,20rem);font-weight:900;color:var(--primary);line-height:1;text-shadow:0 0 40px rgba(var(--primary-rgb),0.4),0 0 80px rgba(var(--primary-rgb),0.2),0 0 120px rgba(var(--primary-rgb),0.1);margin:0.2rem 0; }
    .ac-number.animate { animation:numAppear 0.6s ease-out,glow 2.5s ease-in-out infinite 0.6s; }

    .ac-arrow { margin:0.8rem 0;display:flex;align-items:center;justify-content:center;gap:1rem; }
    .ac-arrow-line { width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--secondary),transparent); }
    .ac-arrow-icon { font-size:2.5rem;color:var(--secondary);animation:arrowBounce 1.5s ease-in-out infinite;text-shadow:0 0 15px rgba(var(--secondary-rgb),0.5); }
    @keyframes arrowBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }

    .ac-counter-section { display:inline-block;background:linear-gradient(135deg,rgba(var(--secondary-rgb),0.12),rgba(var(--secondary-rgb),0.04));border:2px solid rgba(var(--secondary-rgb),0.3);border-radius:24px;padding:1.5rem 4rem;box-shadow:0 0 30px rgba(var(--secondary-rgb),0.1),inset 0 0 30px rgba(var(--secondary-rgb),0.03); }
    .ac-clabel { font-size:2.2rem;color:var(--secondary);margin-bottom:0.4rem;font-weight:900;letter-spacing:2px;opacity:1;text-shadow:0 0 15px rgba(var(--secondary-rgb),0.3); }
    .ac-cnum { font-size:7rem;font-weight:900;line-height:1.1;background:linear-gradient(135deg,var(--secondary),#2ecc71);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .ac-cnum span { font-size:0.5em;opacity:0.8;vertical-align:top; }
    .ac-cnum.animate { animation:cAppear 0.5s ease-out 0.15s both; }
    .ac-cname { font-size:2rem;color:rgba(var(--secondary-rgb),0.9);font-weight:900;margin-top:0.4rem;text-shadow:0 0 10px rgba(var(--secondary-rgb),0.2); }

    .marquee-bar { flex-shrink:0;background:var(--marquee-bg);border-top:1px solid var(--marquee-border);overflow:hidden;height:42px;display:flex;align-items:center;position:relative;z-index:1; }
    .marquee-bar::before { content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(var(--bg1),0.9) 0%,transparent 10%,transparent 90%,rgba(var(--bg1),0.9) 100%);z-index:1;pointer-events:none; }
    .marquee-bar .label { flex-shrink:0;padding:0 1rem;font-size:0.8rem;font-weight:800;color:var(--primary);background:rgba(var(--primary-rgb),0.1);height:100%;display:flex;align-items:center;z-index:3;border-left:1px solid rgba(var(--primary-rgb),0.15); }
    .marquee-track { flex:1;overflow:hidden;position:relative; }
    .marquee-content { display:inline-block;white-space:nowrap;animation:marqueeScroll 22s linear infinite;font-size:1.05rem;font-weight:600;color:#ddddef;padding-left:2rem;letter-spacing:0.3px; }
    @keyframes marqueeScroll { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

    @keyframes numAppear { 0%{transform:scale(0.2);opacity:0} 60%{transform:scale(1.08);opacity:1} 100%{transform:scale(1);opacity:1} }
    @keyframes cAppear { 0%{transform:translateY(25px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    @keyframes glow { 0%,100%{text-shadow:0 0 40px rgba(var(--primary-rgb),0.3),0 0 80px rgba(var(--primary-rgb),0.12)} 50%{text-shadow:0 0 60px rgba(var(--primary-rgb),0.55),0 0 120px rgba(var(--primary-rgb),0.25)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .sidebar::-webkit-scrollbar{width:4px} .sidebar::-webkit-scrollbar-track{background:transparent} .sidebar::-webkit-scrollbar-thumb{background:rgba(var(--primary-rgb),0.1);border-radius:2px}

    /* LAYOUT: centered */
    body.layout-centered .sidebar { display:none; }
    body.layout-centered .center { flex:1; justify-content:center; align-items:center; }
    body.layout-centered .ac-number { font-size:clamp(8rem,24vw,22rem); }
    body.layout-centered .ac-label { font-size:2rem; }
    body.layout-centered .ac-counter-section { padding:1.2rem 3.5rem; }
    body.layout-centered .ac-cnum { font-size:5.5rem; }

    /* LAYOUT: wide */
    body.layout-wide .sidebar { width:320px; }
    body.layout-wide .center { flex-direction:row; align-items:center; justify-content:center; gap:3rem; padding:2rem 3rem; }
    body.layout-wide .active-call { display:flex !important; align-items:center; justify-content:center; gap:3rem; }
    body.layout-wide .active-call.hide-wide { display:none !important; }
    body.layout-wide .ac-student-section { margin-bottom:0; text-align:center; }
    body.layout-wide .ac-number { font-size:clamp(8rem,22vw,20rem); }
    body.layout-wide .ac-arrow { margin:0; transform:rotate(90deg); }
    body.layout-wide .ac-counter-section { padding:1.5rem 4rem; }
    body.layout-wide .ac-cnum { font-size:7rem; }

    /* LAYOUT: minimal */
    body.layout-minimal .sidebar { display:none; }
    body.layout-minimal .frame-border-outer, body.layout-minimal .frame-border-inner,
    body.layout-minimal .corner-diamond, body.layout-minimal .arc,
    body.layout-minimal .run-light, body.layout-minimal .star-particle,
    body.layout-minimal .glow-spot { display:none !important; }
    body.layout-minimal .center { flex:1; justify-content:center; align-items:center; background:linear-gradient(180deg,var(--bg2),var(--bg1)); }
    body.layout-minimal .ac-number { font-size:clamp(8rem,24vw,22rem); text-shadow:0 0 30px rgba(var(--primary-rgb),0.2); }
    body.layout-minimal .ac-label { font-size:2rem; }
    body.layout-minimal .ac-counter-section { border-radius:20px; padding:1.2rem 3.5rem; border-width:1px; }
    body.layout-minimal .ac-cnum { font-size:5rem; }
    body.layout-minimal .ac-arrow { margin:0.5rem 0; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="glow-spot gs-1"></div><div class="glow-spot gs-2"></div><div class="glow-spot gs-3"></div>
    <div class="frame-border-outer"></div><div class="frame-border-inner"></div>
    <div class="corner-diamond cd-tl"></div><div class="corner-diamond cd-tr"></div><div class="corner-diamond cd-bl"></div><div class="corner-diamond cd-br"></div>
    <div class="arc arc-tl"></div><div class="arc arc-tr"></div><div class="arc arc-bl"></div><div class="arc arc-br"></div>
    <div class="run-light run-top"></div><div class="run-light run-right"></div><div class="run-light run-bottom"></div><div class="run-light run-left"></div>
    <div class="star-particle"></div><div class="star-particle"></div><div class="star-particle"></div><div class="star-particle"></div>
    <div class="star-particle"></div><div class="star-particle"></div><div class="star-particle"></div><div class="star-particle"></div>
  </div>

  <div class="top-bar">
    <div class="brand">
      <span class="uni">جامعة اللوتس</span>
      <div class="sep"></div>
      <span class="dept">إدارة شئون الطلاب</span>

  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="center">
      <div class="idle-msg" id="idleMsg">
        <div class="ic">&#128203;</div>

          <div class="ac-label">&#9733; رقم الطالب</div>

          <div class="ac-clabel" id="acClabel">التوجه إلى المكتب</div>

    </div>

  <div id="designerCredit" style="position:fixed;bottom:50px;left:1rem;font-size:0.7rem;color:rgba(255,255,255,0.15);z-index:1000;font-weight:600;">برمجة مهندس بولس سمير</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const THEMES = {
      gold: { bg1:'#05050f',bg2:'#080818',bg3:'#0d0d28',primary:'#ffd700','primary-rgb':'255,215,0',secondary:'#4ecca3','secondary-rgb':'78,204,163',muted:'#8888bb',dim:'#333355' },
      blue: { bg1:'#050a18',bg2:'#081028',bg3:'#0a1538',primary:'#00bfff','primary-rgb':'0,191,255',secondary:'#7b68ee','secondary-rgb':'123,104,238',muted:'#6a8cbf',dim:'#1a3355' },
      red: { bg1:'#0f0505',bg2:'#180808',bg3:'#200d0d',primary:'#ff4444','primary-rgb':'255,68,68',secondary:'#ff8c00','secondary-rgb':'255,140,0',muted:'#bb6666',dim:'#553333' },
      neon: { bg1:'#050510',bg2:'#0a0a20',bg3:'#100a28',primary:'#ff00ff','primary-rgb':'255,0,255',secondary:'#00ffff','secondary-rgb':'0,255,255',muted:'#8866bb',dim:'#443366' },
      green: { bg1:'#050f05',bg2:'#081808',bg3:'#0d200d',primary:'#00e676','primary-rgb':'0,230,118',secondary:'#69f0ae','secondary-rgb':'105,240,174',muted:'#66bb66',dim:'#335533' }
    };

    const THEME_NAMES = { gold:'كلاسيك ذهبي', blue:'أزرق كوني', red:'أحمر ناري', neon:'نيون سايبر', green:'أخضر طبيعي' };

    let lastTS = null, lastPlayTS = null;
    let countersConfig = {}, countersData = {};
    const CCOLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#16a085','#c0392b'];

    function applyTheme(id) {
      const t = THEMES[id] || THEMES.gold;
      const r = document.documentElement.style;
      r.setProperty('--bg1', t.bg1); r.setProperty('--bg2', t.bg2); r.setProperty('--bg3', t.bg3);
      r.setProperty('--primary', t.primary); r.setProperty('--primary-rgb', t['primary-rgb']);
      r.setProperty('--secondary', t.secondary); r.setProperty('--secondary-rgb', t['secondary-rgb']);
      r.setProperty('--text', '#fff'); r.setProperty('--muted', t.muted); r.setProperty('--dim', t.dim);
      r.setProperty('--bar-bg', `rgba(0,0,0,0.4)`); r.setProperty('--sidebar-bg', 'rgba(0,0,0,0.3)');
      r.setProperty('--card-bg', 'rgba(255,255,255,0.015)'); r.setProperty('--card-border', 'rgba(255,255,255,0.04)');
    }

    function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
    setInterval(tick,1000); tick();

    db.ref('settings/displayTheme').on('value', snap => { applyTheme(snap.val() || 'gold'); });
    db.ref('settings/displayLayout').on('value', snap => {
      const layout = snap.val() || 'classic';
      document.body.className = 'layout-' + layout;
    });
    db.ref('settings/announcements').on('value', snap => { const txt=snap.val(); if(txt&&txt.trim()) document.getElementById('marqueeText').textContent=txt; });

    db.ref('settings/counters').on('value', snap => { countersConfig=snap.val()||{}; renderSidebar(); });

    function renderSidebar() {
      const keys = Object.keys(countersConfig);
      if(!keys.length){ document.getElementById('sidebar').innerHTML='<div class="sb-head"><h2>لا يوجد مكاتب</h2></div>'; return; }
      let h='<div class="sb-head"><h2>حالة المكاتب</h2></div>';
      keys.forEach((id,i)=>{
        const name=countersConfig[id], color=CCOLORS[i%CCOLORS.length], cd=countersData[id]||{}, busy=cd.status==='busy'&&cd.number>0;
        h+=`<div class="cc ${busy?'busy':'idle'}"><div class="cc-info"><div class="cc-name" style="color:${busy?color:'var(--secondary)'};">${name}</div><div class="cc-status">${busy?'جاري الخدمة':'فارغ'}</div></div><div class="cc-num"><div class="cc-big" style="${busy?'color:'+color+';text-shadow:0 0 15px '+color+'55;':''}">${busy?cd.number:'-'}</div><div class="cc-label" style="${busy?'color:'+color+'88;':''}">${busy?'رقم '+cd.number:'فارغ'}</div></div></div>`;
      });
      document.getElementById('sidebar').innerHTML=h;
    }

    db.ref('counters').on('value', snap => { countersData=snap.val()||{}; renderSidebar(); });

    db.ref('currentCall').on('value', snap => {
      const data=snap.val();
      if(!data||!data.number||data.number===0){ document.getElementById('idleMsg').style.display='block'; document.getElementById('activeCall').classList.remove('show'); return; }
      if(data.timestamp===lastTS) return; lastTS=data.timestamp;
      document.getElementById('idleMsg').style.display='none';
      const ac=document.getElementById('activeCall'),an=document.getElementById('acNum'),acn=document.getElementById('acCounter'),acCnum=document.getElementById('acCounter').parentElement,acName=document.getElementById('acCounterName'),acLabel=document.getElementById('acClabel');
      ac.classList.add('show'); an.classList.remove('animate'); acCnum.classList.remove('animate'); void an.offsetWidth;
      an.classList.add('animate'); acCnum.classList.add('animate');
      an.textContent=data.number; acn.textContent=data.counter;
      acName.textContent='بشئون الطلاب';
      acLabel.textContent='التوجه إلى المكتب';
      if(data.timestamp!==lastPlayTS){ lastPlayTS=data.timestamp; playBeep(); }
    });

    function playBeep() { try{const ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime;[{freq:880,start:0,dur:0.3,vol:0.6},{freq:1100,start:0.35,dur:0.3,vol:0.7},{freq:1320,start:0.7,dur:0.35,vol:0.8}].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=t.freq;o.type='sine';g.gain.setValueAtTime(t.vol,now+t.start);g.gain.exponentialRampToValueAtTime(0.01,now+t.start+t.dur);o.start(now+t.start);o.stop(now+t.start+t.dur)});}catch(e){} }
    document.addEventListener('click',function(){try{const c=new(window.AudioContext||window.webkitAudioContext)();if(c.state==='suspended')c.resume();}catch(e){}},{once:true});

    function goFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen();}
    document.addEventListener('keydown',e=>{if(e.key==='F11'){e.preventDefault();goFS();}});
    document.addEventListener('click',function(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});},{once:true});
    try{document.documentElement.requestFullscreen();}catch(e){}
  </script>
</body>
</html>
