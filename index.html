<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شاشة العرض</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #05050f;
      height: 100vh;
      color: #fff;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
    }

    /* ===== STUNNING FRAME ===== */
    .frame { position: fixed; inset: 0; pointer-events: none; z-index: 999; }

    /* Outer neon border - double line */
    .frame-border-outer {
      position: absolute; inset: 4px;
      border: 2px solid rgba(255,215,0,0.15);
      border-radius: 8px;
      animation: borderPulse 4s ease-in-out infinite;
    }
    .frame-border-inner {
      position: absolute; inset: 10px;
      border: 1px solid rgba(78,204,163,0.08);
      border-radius: 6px;
    }
    @keyframes borderPulse {
      0%,100% { border-color: rgba(255,215,0,0.15); box-shadow: inset 0 0 30px rgba(255,215,0,0.03), 0 0 30px rgba(255,215,0,0.03); }
      50% { border-color: rgba(255,215,0,0.35); box-shadow: inset 0 0 60px rgba(255,215,0,0.06), 0 0 60px rgba(255,215,0,0.06); }
    }

    /* Corner diamonds */
    .corner-diamond {
      position: absolute; width: 16px; height: 16px;
      background: #ffd700; transform: rotate(45deg);
      animation: diamondPulse 3s ease-in-out infinite;
    }
    .corner-diamond::before {
      content: ''; position: absolute; inset: 3px;
      background: #05050f; transform: rotate(0deg);
    }
    .cd-tl { top: -2px; left: -2px; }
    .cd-tr { top: -2px; right: -2px; }
    .cd-bl { bottom: -2px; left: -2px; }
    .cd-br { bottom: -2px; right: -2px; }
    .cd-tl, .cd-br { animation-delay: 0s; }
    .cd-tr, .cd-bl { animation-delay: 1.5s; }
    @keyframes diamondPulse {
      0%,100% { background: #ffd700; box-shadow: 0 0 8px rgba(255,215,0,0.3); }
      50% { background: #ffe44d; box-shadow: 0 0 25px rgba(255,215,0,0.8), 0 0 50px rgba(255,215,0,0.3); }
    }

    /* Running light along border */
    .run-light {
      position: absolute;
      width: 80px; height: 3px;
      background: linear-gradient(90deg, transparent, #ffd700, #fff, #ffd700, transparent);
      border-radius: 2px;
      filter: blur(0.5px);
    }
    .run-top { top: 4px; animation: runTop 8s linear infinite; }
    .run-right { right: 4px; top: 0; width: 3px; height: 80px;
      background: linear-gradient(180deg, transparent, #4ecca3, #fff, #4ecca3, transparent);
      animation: runRight 8s linear infinite; }
    .run-bottom { bottom: 4px; animation: runBottom 8s linear infinite;
      background: linear-gradient(90deg, transparent, #ffd700, #fff, #ffd700, transparent); }
    .run-left { left: 4px; top: 0; width: 3px; height: 80px;
      background: linear-gradient(180deg, transparent, #4ecca3, #fff, #4ecca3, transparent);
      animation: runLeft 8s linear infinite; }

    @keyframes runTop { 0%{left:-80px} 100%{left:calc(100% + 80px)} }
    @keyframes runRight { 0%{top:-80px} 100%{top:calc(100% + 80px)} }
    @keyframes runBottom { 0%{left:calc(100% + 80px)} 100%{left:-80px} }
    @keyframes runLeft { 0%{top:calc(100% + 80px)} 100%{top:-80px} }

    /* Corner accent arcs */
    .arc {
      position: absolute; width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid transparent;
    }
    .arc-tl { top: 6px; left: 6px; border-top-color: rgba(255,215,0,0.25); border-left-color: rgba(255,215,0,0.25); animation: arcSpin 6s linear infinite; transform-origin: center; }
    .arc-tr { top: 6px; right: 6px; border-top-color: rgba(78,204,163,0.25); border-right-color: rgba(78,204,163,0.25); animation: arcSpin 6s linear infinite reverse; transform-origin: center; }
    .arc-bl { bottom: 6px; left: 6px; border-bottom-color: rgba(78,204,163,0.25); border-left-color: rgba(78,204,163,0.25); animation: arcSpin 6s linear infinite; transform-origin: center; }
    .arc-br { bottom: 6px; right: 6px; border-bottom-color: rgba(255,215,0,0.25); border-right-color: rgba(255,215,0,0.25); animation: arcSpin 6s linear infinite reverse; transform-origin: center; }
    @keyframes arcSpin { to { transform: rotate(360deg); } }

    /* Floating particles */
    .star-particle {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      animation: starFloat linear infinite;
    }
    .star-particle:nth-child(1) { left:8%; animation-duration:9s; animation-delay:0s; }
    .star-particle:nth-child(2) { left:18%; animation-duration:11s; animation-delay:2s; }
    .star-particle:nth-child(3) { left:30%; animation-duration:8s; animation-delay:4s; }
    .star-particle:nth-child(4) { left:42%; animation-duration:12s; animation-delay:1s; }
    .star-particle:nth-child(5) { left:55%; animation-duration:7s; animation-delay:5s; }
    .star-particle:nth-child(6) { left:65%; animation-duration:10s; animation-delay:3s; }
    .star-particle:nth-child(7) { left:78%; animation-duration:9s; animation-delay:6s; }
    .star-particle:nth-child(8) { left:90%; animation-duration:11s; animation-delay:0.5s; }
    @keyframes starFloat {
      0% { bottom:-5px; opacity:0; transform: scale(0.5); }
      8% { opacity:0.8; transform: scale(1); }
      50% { opacity:0.4; }
      92% { opacity:0.8; transform: scale(1); }
      100% { bottom:100%; opacity:0; transform: scale(0.5); }
    }

    /* Glow spots */
    .glow-spot {
      position: absolute; border-radius: 50%;
      filter: blur(60px); opacity: 0.08;
      animation: glowDrift 12s ease-in-out infinite alternate;
    }
    .gs-1 { width:300px; height:300px; background:#ffd700; top:-100px; right:-50px; animation-delay:0s; }
    .gs-2 { width:250px; height:250px; background:#4ecca3; bottom:-80px; left:-40px; animation-delay:4s; }
    .gs-3 { width:200px; height:200px; background:#3498db; top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:8s; }
    @keyframes glowDrift {
      0% { opacity:0.05; transform: translate(0,0) scale(1); }
      100% { opacity:0.12; transform: translate(20px,-15px) scale(1.2); }
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 2.5rem;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,215,0,0.1);
      flex-shrink: 0;
      height: 56px;
      position: relative;
      z-index: 1;
    }
    .brand { display: flex; align-items: center; gap: 1rem; }
    .brand .uni { font-size: 1.2rem; font-weight: 800; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.3); letter-spacing: 0.5px; }
    .brand .sep { width: 2px; height: 26px; background: linear-gradient(180deg, transparent, #ffd700, transparent); }
    .brand .dept { font-size: 1rem; color: #b8b8d0; font-weight: 700; }
    .clock { font-size: 1.1rem; color: #8888bb; font-weight: 600; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px rgba(136,136,187,0.15); }

    /* ===== BODY ===== */
    .body { flex: 1; display: flex; overflow: hidden; position: relative; z-index: 1; background: linear-gradient(135deg, #080818 0%, #0d0d28 50%, #080818 100%); }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 380px; flex-shrink: 0;
      background: rgba(0,0,0,0.3);
      border-left: 1px solid rgba(255,215,0,0.06);
      display: flex; flex-direction: column;
      padding: 1rem 0.8rem; gap: 0.5rem;
      overflow-y: auto;
    }
    .sb-head {
      text-align: center;
      padding: 0.5rem 0 0.8rem;
      border-bottom: 1px solid rgba(255,215,0,0.08);
      margin-bottom: 0.3rem;
    }
    .sb-head h2 { font-size: 1.05rem; font-weight: 800; color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.15); }

    /* ===== COUNTER CARD ===== */
    .cc {
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 16px; padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 0.8rem;
      transition: all 0.5s ease; position: relative; overflow: hidden;
    }
    .cc::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 4px; height: 100%; border-radius: 0 16px 16px 0;
      transition: all 0.5s ease;
    }
    .cc.idle { border-color: rgba(78,204,163,0.08); }
    .cc.idle::after { background: linear-gradient(180deg, #4ecca3, #2a9d7a); }
    .cc.busy {
      border-color: rgba(255,215,0,0.2);
      background: linear-gradient(135deg, rgba(255,215,0,0.06), rgba(255,215,0,0.015));
      animation: busyPulse 3s ease-in-out infinite;
    }
    .cc.busy::after {
      background: linear-gradient(180deg, #ffd700, #e6b800);
      box-shadow: 0 0 10px rgba(255,215,0,0.3);
    }
    @keyframes busyPulse {
      0%,100% { box-shadow: none; }
      50% { box-shadow: 0 0 20px rgba(255,215,0,0.06), inset 0 0 12px rgba(255,215,0,0.02); }
    }
    .cc-badge {
      width: 52px; height: 52px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 900; flex-shrink: 0; transition: all 0.5s ease;
    }
    .cc.idle .cc-badge { background: rgba(78,204,163,0.1); color: #4ecca3; }
    .cc.busy .cc-badge { background: rgba(255,215,0,0.18); color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.15); }
    .cc-info { flex: 1; min-width: 0; }
    .cc-name { font-size: 1rem; font-weight: 800; margin-bottom: 0.15rem; transition: color 0.5s; }
    .cc.idle .cc-name { color: #4ecca3; }
    .cc.busy .cc-name { color: #ffd700; }
    .cc-status { font-size: 0.8rem; font-weight: 600; transition: color 0.5s; }
    .cc.idle .cc-status { color: #2a7a5a; }
    .cc.busy .cc-status { color: #c0a830; }
    .cc-num { text-align: center; flex-shrink: 0; min-width: 90px; }
    .cc-big { font-size: 2.5rem; font-weight: 900; line-height: 1; transition: all 0.5s ease; }
    .cc.idle .cc-big { color: #1e4a38; font-size: 1.5rem; }
    .cc.busy .cc-big { color: #ffd700; text-shadow: 0 0 15px rgba(255,215,0,0.35); animation: numGlow 2s ease-in-out infinite; }
    .cc-label { font-size: 0.65rem; font-weight: 700; color: #333355; margin-top: 0.1rem; }
    .cc.busy .cc-label { color: #9a8a28; }
    @keyframes numGlow {
      0%,100% { text-shadow: 0 0 15px rgba(255,215,0,0.35); }
      50% { text-shadow: 0 0 25px rgba(255,215,0,0.65), 0 0 45px rgba(255,215,0,0.2); }
    }
    .cc-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ecca3;
      position: absolute; top: 10px; left: 10px;
      animation: dotBlink 3s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%,100% { opacity: 0.25; }
      50% { opacity: 1; box-shadow: 0 0 8px rgba(78,204,163,0.5); }
    }

    /* ===== CENTER ===== */
    .center {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
      position: relative;
    }
    .idle-msg { text-align: center; color: #333355; position: relative; z-index: 1; }
    .idle-msg .ic { font-size: 5rem; margin-bottom: 1rem; opacity: 0.12; animation: idleFloat 4s ease-in-out infinite; }
    .idle-msg .tx { font-size: 2rem; font-weight: 700; color: #444466; }
    @keyframes idleFloat { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-15px) scale(1.05)} }

    .active-call { display: none; text-align: center; width: 100%; animation: fadeIn 0.4s ease; position: relative; z-index: 1; }
    .active-call.show { display: block; }

    /* Student number section - GOLD */
    .ac-student-section { margin-bottom: 0.5rem; }
    .ac-label {
      font-size: 1.1rem; color: #ffd700; font-weight: 700; margin-bottom: 0.3rem;
      text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;
    }
    .ac-number {
      font-size: 16rem; font-weight: 900; color: #ffd700; line-height: 1;
      text-shadow: 0 0 40px rgba(255,215,0,0.4), 0 0 80px rgba(255,215,0,0.2), 0 0 120px rgba(255,215,0,0.1);
      margin: 0.2rem 0;
    }
    .ac-number.animate { animation: numAppear 0.6s ease-out, glow 2.5s ease-in-out infinite 0.6s; }

    /* Arrow between student and counter */
    .ac-arrow {
      margin: 0.8rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .ac-arrow-line {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, #4ecca3, transparent);
    }
    .ac-arrow-icon {
      font-size: 2.5rem;
      color: #4ecca3;
      animation: arrowBounce 1.5s ease-in-out infinite;
      text-shadow: 0 0 15px rgba(78,204,163,0.5);
    }
    @keyframes arrowBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    /* Counter section - GREEN BOX */
    .ac-counter-section {
      display: inline-block;
      background: linear-gradient(135deg, rgba(78,204,163,0.12), rgba(78,204,163,0.04));
      border: 2px solid rgba(78,204,163,0.3);
      border-radius: 24px;
      padding: 1.2rem 3.5rem;
      box-shadow: 0 0 30px rgba(78,204,163,0.1), inset 0 0 30px rgba(78,204,163,0.03);
    }
    .ac-clabel {
      font-size: 1.1rem; color: #4ecca3; margin-bottom: 0.3rem; font-weight: 700;
      letter-spacing: 1px; opacity: 0.9;
    }
    .ac-cnum {
      font-size: 6rem; font-weight: 900; color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.3); line-height: 1.1;
      background: linear-gradient(135deg, #4ecca3, #2ecc71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ac-cnum.animate { animation: cAppear 0.5s ease-out 0.15s both; }
    .ac-cname {
      font-size: 1.2rem; color: rgba(78,204,163,0.7); font-weight: 600; margin-top: 0.2rem;
    }

    /* ===== MARQUEE ===== */
    .marquee-bar {
      flex-shrink: 0;
      background: rgba(255,215,0,0.05);
      border-top: 1px solid rgba(255,215,0,0.1);
      overflow: hidden;
      height: 42px;
      display: flex;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .marquee-bar::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(5,5,15,0.9) 0%, transparent 10%, transparent 90%, rgba(5,5,15,0.9) 100%);
      z-index: 1; pointer-events: none;
    }
    .marquee-bar .label {
      flex-shrink: 0;
      padding: 0 1rem;
      font-size: 0.8rem;
      font-weight: 800;
      color: #ffd700;
      background: rgba(255,215,0,0.1);
      height: 100%;
      display: flex;
      align-items: center;
      z-index: 3;
      border-left: 1px solid rgba(255,215,0,0.15);
    }
    .marquee-track { flex: 1; overflow: hidden; position: relative; }
    .marquee-content {
      display: inline-block;
      white-space: nowrap;
      animation: marqueeScroll 22s linear infinite;
      font-size: 1.05rem;
      font-weight: 600;
      color: #ddddef;
      padding-left: 2rem;
      letter-spacing: 0.3px;
    }
    @keyframes marqueeScroll {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ===== HINT ===== */
    .hint {
      position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
      font-size: 0.7rem; color: #1a1a33; opacity: 0.25; cursor: pointer; z-index: 1001;
    }
    .hint:hover { opacity: 0.5; }

    /* ===== ANIMATIONS ===== */
    @keyframes numAppear { 0%{transform:scale(0.2);opacity:0} 60%{transform:scale(1.08);opacity:1} 100%{transform:scale(1);opacity:1} }
    @keyframes cAppear { 0%{transform:translateY(25px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 40px rgba(255,215,0,0.3), 0 0 80px rgba(255,215,0,0.12); }
      50% { text-shadow: 0 0 60px rgba(255,215,0,0.55), 0 0 120px rgba(255,215,0,0.25); }
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.1); border-radius: 2px; }
  </style>
</head>
<body>
  <!-- ===== FRAME ===== -->
  <div class="frame">
    <!-- Glow spots -->
    <div class="glow-spot gs-1"></div>
    <div class="glow-spot gs-2"></div>
    <div class="glow-spot gs-3"></div>

    <!-- Borders -->
    <div class="frame-border-outer"></div>
    <div class="frame-border-inner"></div>

    <!-- Corner diamonds -->
    <div class="corner-diamond cd-tl"></div>
    <div class="corner-diamond cd-tr"></div>
    <div class="corner-diamond cd-bl"></div>
    <div class="corner-diamond cd-br"></div>

    <!-- Rotating arcs -->
    <div class="arc arc-tl"></div>
    <div class="arc arc-tr"></div>
    <div class="arc arc-bl"></div>
    <div class="arc arc-br"></div>

    <!-- Running lights -->
    <div class="run-light run-top"></div>
    <div class="run-light run-right"></div>
    <div class="run-light run-bottom"></div>
    <div class="run-light run-left"></div>

    <!-- Floating stars -->
    <div class="star-particle"></div>
    <div class="star-particle"></div>
    <div class="star-particle"></div>
    <div class="star-particle"></div>
    <div class="star-particle"></div>
    <div class="star-particle"></div>
    <div class="star-particle"></div>
    <div class="star-particle"></div>
  </div>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <div class="brand">
      <span class="uni">جامعة اللوتس</span>
      <div class="sep"></div>
      <span class="dept">إدارة شئون الطلاب</span>
    </div>
    <div class="clock" id="clock"></div>
  </div>

  <!-- ===== BODY ===== -->
  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="center">
      <div class="idle-msg" id="idleMsg">
        <div class="ic">&#128203;</div>
        <div class="tx">بانتظار أول رقم</div>
      </div>
      <div class="active-call" id="activeCall">
        <div class="ac-student-section">
          <div class="ac-label">&#9733; رقم الطالب</div>
          <div class="ac-number" id="acNum">--</div>
        </div>
        <div class="ac-arrow">
          <div class="ac-arrow-line"></div>
          <div class="ac-arrow-icon">&#8595;</div>
          <div class="ac-arrow-line"></div>
        </div>
        <div class="ac-counter-section">
          <div class="ac-clabel">توجه إلى المكتب</div>
          <div class="ac-cnum" id="acCounter">--</div>
          <div class="ac-cname" id="acCounterName"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MARQUEE ===== -->
  <div class="marquee-bar">
    <div class="label">&#128227; إعلان</div>
    <div class="marquee-track">
      <div class="marquee-content" id="marqueeText">مرحباً بكم في جامعة اللوتس - إدارة شئون الطلاب - يرجى اصطحاب جميع المستندات المطلوبة</div>
    </div>
  </div>

  <div class="hint" onclick="goFS()" style="display:none;">اضغط F11 للعرض بملء الشاشة</div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    let lastTS = null, lastPlayTS = null;
    let countersConfig = {};
    let countersData = {};
    const COLORS = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#16a085','#c0392b'];

    function tick() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
    setInterval(tick, 1000); tick();

    db.ref('settings/announcements').on('value', snap => {
      const txt = snap.val();
      if (txt && txt.trim()) document.getElementById('marqueeText').textContent = txt;
    });

    db.ref('settings/counters').on('value', snap => {
      countersConfig = snap.val() || {};
      renderSidebar();
    });

    function renderSidebar() {
      const keys = Object.keys(countersConfig);
      if (keys.length === 0) {
        document.getElementById('sidebar').innerHTML = '<div class="sb-head"><h2>لا يوجد مكاتب</h2></div>';
        return;
      }
      let h = '<div class="sb-head"><h2>حالة المكاتب</h2></div>';
      keys.forEach((id, i) => {
        const name = countersConfig[id];
        const color = COLORS[i % COLORS.length];
        const cd = countersData[id] || {};
        const busy = cd.status === 'busy' && cd.number > 0;
        h += `<div class="cc ${busy?'busy':'idle'}" id="cc${id}">
          <div class="cc-dot" id="dot${id}" style="${busy?'display:none;':'display:block;'}"></div>
          <div class="cc-info">
            <div class="cc-name" style="color:${busy?color:'#4ecca3'};">${name}</div>
            <div class="cc-status" id="cs${id}">${busy?'جاري الخدمة':'فارغ'}</div>
          </div>
          <div class="cc-num">
            <div class="cc-big" id="cn${id}" style="${busy?'color:'+color+';text-shadow:0 0 15px '+color+'55;':''}">${busy?cd.number:'-'}</div>
            <div class="cc-label" id="cl${id}" style="${busy?'color:'+color+'88;':''}">${busy?'رقم '+cd.number:'فارغ'}</div>
          </div>
        </div>`;
      });
      document.getElementById('sidebar').innerHTML = h;
    }

    db.ref('counters').on('value', snap => {
      countersData = snap.val() || {};
      renderSidebar();
    });

    db.ref('currentCall').on('value', snap => {
      const data = snap.val();
      if (!data || !data.number || data.number === 0) {
        document.getElementById('idleMsg').style.display = 'block';
        document.getElementById('activeCall').classList.remove('show');
        return;
      }
      if (data.timestamp === lastTS) return;
      lastTS = data.timestamp;
      document.getElementById('idleMsg').style.display = 'none';
      const ac = document.getElementById('activeCall');
      const an = document.getElementById('acNum');
      const acn = document.getElementById('acCounter');
      const acName = document.getElementById('acCounterName');
      ac.classList.add('show');
      an.classList.remove('animate'); acn.classList.remove('animate');
      void an.offsetWidth;
      an.classList.add('animate'); acn.classList.add('animate');
      an.textContent = data.number;
      acn.textContent = data.counter;
      const cname = countersConfig[String(data.counter)] || '';
      acName.textContent = cname;
      if (data.timestamp !== lastPlayTS) {
        lastPlayTS = data.timestamp;
        playBeepThenAnnounce(data.number, data.counter);
      }
    });

    function playBeepThenAnnounce(num, c) {
      playBeep();
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        const now = ctx.currentTime;
        const tones = [
          { freq: 880,  start: 0,    dur: 0.3, vol: 0.6 },
          { freq: 1100, start: 0.35, dur: 0.3, vol: 0.7 },
          { freq: 1320, start: 0.7,  dur: 0.35, vol: 0.8 },
        ];
        tones.forEach(t => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = t.freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(t.vol, now + t.start);
          gain.gain.exponentialRampToValueAtTime(0.01, now + t.start + t.dur);
          osc.start(now + t.start);
          osc.stop(now + t.start + t.dur);
        });
      } catch(e) { console.warn('Beep failed:', e); }
    }
    document.addEventListener('click', function unlockAudio() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
      } catch(e) {}
      document.removeEventListener('click', unlockAudio);
    }, { once: true });

    function goFS() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
      else document.exitFullscreen();
    }
    document.addEventListener('keydown', e => { if(e.key==='F11'){e.preventDefault();goFS();} });

    /* Auto fullscreen on load */
    document.addEventListener('click', function autoFS() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
      document.removeEventListener('click', autoFS);
    }, { once: true });
    /* Also try immediately (works in some browsers) */
    try { document.documentElement.requestFullscreen(); } catch(e) {}
  </script>
</body>
</html>
